version: '3.9'

# 使用方式：
#   1) 在项目根目录执行：  docker compose -f deploy/docker-compose.yml --env-file .env up -d
#   2) .env 文件应与 .env.example 保持同名变量

services:
  mysql:
    image: mysql:8.0
    container_name: hw-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpass}
      MYSQL_DATABASE: ${DB_NAME:-handwriting}
      MYSQL_USER: ${DB_USERNAME:-handwriting}
      MYSQL_PASSWORD: ${DB_PASSWORD:-handwriting}
      TZ: Asia/Shanghai
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
      - --default-authentication-plugin=caching_sha2_password
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-rootpass}"]
      interval: 10s
      timeout: 5s
      retries: 6

  redis:
    image: redis:7-alpine
    container_name: hw-redis
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:-}"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 6

  minio:
    image: minio/minio:latest
    container_name: hw-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${STORAGE_ACCESS_KEY:-minio}
      MINIO_ROOT_PASSWORD: ${STORAGE_SECRET_KEY:-minio123}
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 6

  client:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: hw-client
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SERVER_PORT: 8080

      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-handwriting}
      DB_USERNAME: ${DB_USERNAME:-handwriting}
      DB_PASSWORD: ${DB_PASSWORD:-handwriting}

      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}

      STORAGE_ENDPOINT: http://minio:9000
      STORAGE_ACCESS_KEY: ${STORAGE_ACCESS_KEY:-minio}
      STORAGE_SECRET_KEY: ${STORAGE_SECRET_KEY:-minio123}
      STORAGE_BUCKET_COLLECT: ${STORAGE_BUCKET_COLLECT:-handwriting-collect}
      STORAGE_BUCKET_AUDIT: ${STORAGE_BUCKET_AUDIT:-handwriting-audit}
      STORAGE_BUCKET_BACKUP: ${STORAGE_BUCKET_BACKUP:-handwriting-backup}

      JWT_SECRET: ${JWT_SECRET:-Y2hhbmdlLW1lLXRoaXMtaXMtYS1kZWZhdWx0LWp3dC1zZWNyZXQ=}
      JWT_ISSUER: handwriting-client

      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-*}
    ports:
      - "${SERVER_PORT:-8080}:8080"
    volumes:
      - ./logs:/app/logs

volumes:
  mysql-data:
  redis-data:
  minio-data:
