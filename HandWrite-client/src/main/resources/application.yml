server:
  port: ${HANDWRITE_SERVER_PORT:8080}
  tomcat:
    max-threads: ${HANDWRITE_SERVER_TOMCAT_MAX_THREADS:200}
    accept-count: 200
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/plain

spring:
  application:
    name: handwriting-client
  # 优先从 .env 读取，再退回系统环境变量（os.environment）
  config:
    import: "optional:file:./.env[.properties],optional:file:./tools/.env[.properties]"
  profiles:
    active: ${HANDWRITE_SPRING_PROFILES_ACTIVE:dev}
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: ${HANDWRITE_APP_TIMEZONE:Asia/Shanghai}
    default-property-inclusion: non_null

  # ====== MySQL DataSource (env driven, with dev defaults) ======
  datasource:
    url: jdbc:mysql://${HANDWRITE_DB_HOST:127.0.0.1}:${HANDWRITE_DB_PORT:3306}/${HANDWRITE_DB_NAME:handwriting}?useSSL=${HANDWRITE_DB_USE_SSL:false}&useUnicode=true&characterEncoding=utf8&serverTimezone=${HANDWRITE_DB_TIMEZONE:Asia/Shanghai}&allowPublicKeyRetrieval=true
    username: ${HANDWRITE_DB_USERNAME:root}
    password: ${HANDWRITE_DB_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: ${HANDWRITE_DB_POOL_MAX:20}
      minimum-idle: ${HANDWRITE_DB_POOL_MIN:5}
      idle-timeout: 30000
      max-lifetime: 1800000
      connection-timeout: 30000

  # ====== JPA ======
  jpa:
    hibernate:
      ddl-auto: ${HANDWRITE_JPA_DDL_AUTO:validate}
    open-in-view: false
    properties:
      hibernate:
        format_sql: false

  # ====== Redis ======
  data:
    redis:
      host: ${HANDWRITE_REDIS_HOST:127.0.0.1}
      port: ${HANDWRITE_REDIS_PORT:6379}
      password: ${HANDWRITE_REDIS_PASSWORD:}
      database: ${HANDWRITE_REDIS_DATABASE:0}
      timeout: 5000
      lettuce:
        pool:
          max-active: ${HANDWRITE_REDIS_POOL_MAX_ACTIVE:16}
          max-idle: 8
          min-idle: 2

  # ====== Mail ======
  mail:
    host: ${HANDWRITE_MAIL_HOST:smtp.example.com}
    port: ${HANDWRITE_MAIL_PORT:465}
    username: ${HANDWRITE_MAIL_USERNAME:}
    password: ${HANDWRITE_MAIL_PASSWORD:}
    default-encoding: UTF-8
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: true
            trust: ${HANDWRITE_MAIL_SSL_TRUST:smtp.example.com}

  # ====== Flyway ======
  flyway:
    enabled: ${HANDWRITE_FLYWAY_ENABLED:true}
    baseline-on-migrate: true
    locations: classpath:db/migration
    table: schema_version

  # ====== Servlet Multipart (备用直传) ======
  servlet:
    multipart:
      max-file-size: ${HANDWRITE_UPLOAD_MAX_FILE_SIZE:10MB}
      max-request-size: ${HANDWRITE_UPLOAD_MAX_REQUEST_SIZE:20MB}

# ====== MyBatis-Plus ======
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl
  global-config:
    db-config:
      id-type: AUTO
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  mapper-locations: classpath*:mapper/**/*.xml

# ====== OpenAPI / Swagger ======
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha

# ====== Logging ======
logging:
  level:
    root: INFO
    com.example.handwriting: ${HANDWRITE_LOG_LEVEL_APP:DEBUG}
    org.springframework.security: WARN
  file:
    name: ${HANDWRITE_LOG_FILE_PATH:logs/handwriting-client.log}

# ====== Actuator ======
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}

# ====== Application Configs (统一聚合) ======
app:
  # --- JWT ---
  jwt:
    # Base64 编码后的 256 位密钥，可通过 openssl rand -base64 32 生成
    secret: ${HANDWRITE_JWT_SECRET:Y2hhbmdlLW1lLXRoaXMtaXMtYS1kZWZhdWx0LWp3dC1zZWNyZXQ=}
    issuer: ${HANDWRITE_JWT_ISSUER:handwriting-client}
    access-token-ttl-seconds: ${HANDWRITE_JWT_ACCESS_TTL:900}
    refresh-token-ttl-seconds: ${HANDWRITE_JWT_REFRESH_TTL:604800}
    header: ${HANDWRITE_JWT_HEADER:Authorization}
    prefix: ${HANDWRITE_JWT_PREFIX:"Bearer "}
  # --- CORS ---
  cors:
    allowed-origins: ${HANDWRITE_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}
    allowed-methods: GET,POST,PUT,DELETE,OPTIONS
    allowed-headers: "*"
    allow-credentials: true
    max-age: 3600
  # --- Object Storage (MinIO / S3 / Azure Blob) ---
  storage:
    provider: ${HANDWRITE_STORAGE_PROVIDER:minio}              # minio | s3 | azure
    # 通用
    bucket-collect: ${HANDWRITE_STORAGE_BUCKET_COLLECT:handwriting-collect}
    bucket-audit: ${HANDWRITE_STORAGE_BUCKET_AUDIT:handwriting-audit}
    bucket-backup: ${HANDWRITE_STORAGE_BUCKET_BACKUP:handwriting-backup}
    presign-expire-seconds: ${HANDWRITE_STORAGE_PRESIGN_EXPIRE:600}
    public-base-url: ${HANDWRITE_STORAGE_PUBLIC_BASE_URL:}
    # MinIO / S3（provider=minio/s3 时使用）
    endpoint: ${HANDWRITE_STORAGE_ENDPOINT:http://127.0.0.1:9000}
    access-key: ${HANDWRITE_STORAGE_ACCESS_KEY:minio}
    secret-key: ${HANDWRITE_STORAGE_SECRET_KEY:minio123}
    region: ${HANDWRITE_STORAGE_REGION:us-east-1}
    # Azure Blob Storage（provider=azure 时使用）
    azure-account-name: ${HANDWRITE_AZURE_STORAGE_ACCOUNT:}
    azure-account-key: ${HANDWRITE_AZURE_STORAGE_KEY:}
    azure-sas-token: ${HANDWRITE_AZURE_SAS_TOKEN:}
    azure-connection-string: ${HANDWRITE_AZURE_CONNECTION_STRING:}
    azure-cloud: ${HANDWRITE_AZURE_CLOUD:china}                # china | global | usgov
  # --- Rate Limit ---
  ratelimit:
    auth-per-minute: ${HANDWRITE_RATELIMIT_AUTH_PER_MIN:20}
    upload-per-minute: ${HANDWRITE_RATELIMIT_UPLOAD_PER_MIN:60}
