server:
  port: ${SERVER_PORT:8080}
  tomcat:
    max-threads: ${SERVER_TOMCAT_MAX_THREADS:200}
    accept-count: 200
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/plain

spring:
  application:
    name: handwriting-client
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: ${APP_TIMEZONE:Asia/Shanghai}
    default-property-inclusion: non_null

  # ====== MySQL DataSource (env driven) ======
  datasource:
    url: jdbc:mysql://${DB_HOST:127.0.0.1}:${DB_PORT:3306}/${DB_NAME:handwriting}?useSSL=${DB_USE_SSL:false}&useUnicode=true&characterEncoding=utf8&serverTimezone=${DB_TIMEZONE:Asia/Shanghai}&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: ${DB_POOL_MAX:20}
      minimum-idle: ${DB_POOL_MIN:5}
      idle-timeout: 30000
      max-lifetime: 1800000
      connection-timeout: 30000

  # ====== JPA ======
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:validate}
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: false

  # ====== Redis ======
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DATABASE:0}
      timeout: 5000
      lettuce:
        pool:
          max-active: ${REDIS_POOL_MAX_ACTIVE:16}
          max-idle: 8
          min-idle: 2

  # ====== Mail ======
  mail:
    host: ${MAIL_HOST:smtp.example.com}
    port: ${MAIL_PORT:465}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    default-encoding: UTF-8
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: true
            trust: ${MAIL_SSL_TRUST:smtp.example.com}

  # ====== Flyway ======
  flyway:
    enabled: ${FLYWAY_ENABLED:true}
    baseline-on-migrate: true
    locations: classpath:db/migration
    table: schema_version

  # ====== Servlet Multipart (备用直传) ======
  servlet:
    multipart:
      max-file-size: ${UPLOAD_MAX_FILE_SIZE:10MB}
      max-request-size: ${UPLOAD_MAX_REQUEST_SIZE:20MB}

# ====== MyBatis-Plus ======
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl
  global-config:
    db-config:
      id-type: AUTO
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  mapper-locations: classpath*:mapper/**/*.xml

# ====== OpenAPI / Swagger ======
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha

# ====== Logging ======
logging:
  level:
    root: INFO
    com.example.handwriting: ${LOG_LEVEL_APP:DEBUG}
    org.springframework.security: WARN
  file:
    name: ${LOG_FILE_PATH:logs/handwriting-client.log}

# ====== Actuator ======
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}

# ====== Application Configs (统一聚合) ======
app:
  # --- JWT ---
  jwt:
    # Base64 编码后的 256 位密钥，可通过 openssl rand -base64 32 生成
    secret: ${JWT_SECRET:Y2hhbmdlLW1lLXRoaXMtaXMtYS1kZWZhdWx0LWp3dC1zZWNyZXQ=}
    issuer: ${JWT_ISSUER:handwriting-client}
    access-token-ttl-seconds: ${JWT_ACCESS_TTL:900}
    refresh-token-ttl-seconds: ${JWT_REFRESH_TTL:604800}
    header: ${JWT_HEADER:Authorization}
    prefix: ${JWT_PREFIX:"Bearer "}
  # --- CORS ---
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}
    allowed-methods: GET,POST,PUT,DELETE,OPTIONS
    allowed-headers: "*"
    allow-credentials: true
    max-age: 3600
  # --- Object Storage (MinIO / S3) ---
  storage:
    provider: ${STORAGE_PROVIDER:minio}
    endpoint: ${STORAGE_ENDPOINT:http://127.0.0.1:9000}
    access-key: ${STORAGE_ACCESS_KEY:minio}
    secret-key: ${STORAGE_SECRET_KEY:minio123}
    region: ${STORAGE_REGION:us-east-1}
    bucket-collect: ${STORAGE_BUCKET_COLLECT:handwriting-collect}
    bucket-audit: ${STORAGE_BUCKET_AUDIT:handwriting-audit}
    bucket-backup: ${STORAGE_BUCKET_BACKUP:handwriting-backup}
    presign-expire-seconds: ${STORAGE_PRESIGN_EXPIRE:600}
    public-base-url: ${STORAGE_PUBLIC_BASE_URL:}
  # --- Rate Limit ---
  ratelimit:
    auth-per-minute: ${RATELIMIT_AUTH_PER_MIN:20}
    upload-per-minute: ${RATELIMIT_UPLOAD_PER_MIN:60}
